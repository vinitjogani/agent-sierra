<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sierra</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background-color: #f9f9f9;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Top Navigation */
    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      max-width: 1200px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 1.25rem;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      text-decoration: none;
      color: #666;
      font-weight: 500;
      font-size: 0.95rem;
      transition: color 0.2s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #111;
    }

    .logout-link {
      height: 36px;
      border-radius: 10px;
      padding: 10px 20px;
      background-color: #e2e2e2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      color: #555;
      font-size: 0.9rem;
      text-decoration: none;
      transition: background-color 0.2s;
    }

    .logout-link:hover {
      background-color: #d0d0d0;
    }

    /* Main Content Wrapper */
    main {
      width: 100%;
      max-width: 800px;
      padding: 2rem 1rem;
      flex: 1;
    }

    /* Input Card */
    .input-card {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #eaeaea;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
      padding: 1.25rem;
      margin-bottom: 3rem;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .input-card:focus-within {
      border-color: #d1d5db;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }

    #trigger-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-wrapper {
      position: relative;
    }

    #sentry-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 1.1rem;
      color: #333;
      padding: 0.5rem 0;
    }

    #sentry-input::placeholder {
      color: #a0a0a0;
    }

    .input-tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.5rem;
      border-top: 1px solid transparent;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .dropdown {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      color: #666;
      font-size: 0.85rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .dropdown:hover {
      background: #f0f0f0;
    }

    .dropdown-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #8b5cf6;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .submit-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ccc;
      border: none;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    #sentry-input:not(:placeholder-shown)~.input-tools .submit-btn {
      background: #333;
    }

    .submit-btn:hover {
      opacity: 0.9;
    }

    /* Result Message */
    #trigger-result {
      font-size: 0.85rem;
      color: #666;
      text-align: center;
      min-height: 1.5rem;
      margin-top: -2rem;
      margin-bottom: 2rem;
    }

    #trigger-result a {
      color: #0969da;
      text-decoration: none;
    }

    /* Runs List */
    .runs-container {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .run-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .group-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: #666;
      padding-bottom: 0.5rem;
    }

    .run-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
    }

    .run-left {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .status-icon {
      margin-top: 0.2rem;
      color: #888;
    }

    .run-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .run-title {
      font-size: 0.95rem;
      color: #222;
      font-weight: 400;
    }

    .run-meta {
      font-size: 0.85rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .run-meta a {
      color: inherit;
      text-decoration: none;
      transition: color 0.1s;
    }

    .run-meta a:hover {
      color: #333;
      text-decoration: underline;
    }

    .run-time {
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
        </path>
      </svg>
      <span>Sierra</span>
    </div>

    <a href="/logout" class="logout-link" title="Logout">
      Logout
    </a>
  </header>

  <main>
    <div class="input-card">
      <form id="trigger-form">
        <div class="input-wrapper">
          <input type="url" id="sentry-input" name="sentry_url" placeholder="Paste Sentry Error URL" required>

          <div class="input-tools" style="justify-content: flex-end;">
            <button type="submit" class="submit-btn" aria-label="Submit">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
              </svg>
            </button>
          </div>
        </div>
      </form>
    </div>

    <div id="trigger-result"></div>

    <div class="runs-container" id="runs-list">
      <!-- Runs will be injected by JavaScript here -->
    </div>
  </main>

  <script type="application/json" id="runs-data">
    {{runs_json}}
  </script>
  <script>
    // Data injected from backend
    const rawRuns = JSON.parse(document.getElementById('runs-data').textContent);

    function timeAgo(timestamp) {
      if (!timestamp) return '';
      const seconds = Math.floor((new Date() - new Date(timestamp * 1000)) / 1000);

      let interval = seconds / 31536000;
      if (interval > 1) return Math.floor(interval) + "y";
      interval = seconds / 2592000;
      if (interval > 1) return Math.floor(interval) + "mo";
      interval = seconds / 86400;
      if (interval >= 1 && interval < 2) return "1d";
      if (interval >= 2) return Math.floor(interval) + "d";
      interval = seconds / 3600;
      if (interval >= 1) return Math.floor(interval) + "h";
      interval = seconds / 60;
      if (interval >= 1) return Math.floor(interval) + "m";
      return "now";
    }

    function groupRuns(runs) {
      const groups = {
        "Today": [],
        "This Week": [],
        "Older": []
      };

      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime() / 1000;
      const weekStart = todayStart - (7 * 86400);

      runs.forEach(run => {
        if (!run.created_at) {
          groups["Older"].push(run);
          return;
        }
        if (run.created_at >= todayStart) {
          groups["Today"].push(run);
        } else if (run.created_at >= weekStart) {
          groups["This Week"].push(run);
        } else {
          groups["Older"].push(run);
        }
      });

      return groups;
    }

    function returnIcon() {
      return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 16 16 12 12 8"></polyline><line x1="8" y1="12" x2="16" y2="12"></line></svg>`;
    }

    function renderRuns() {
      const container = document.getElementById('runs-list');
      if (!rawRuns || rawRuns.length === 0) {
        container.innerHTML = '<div class="run-item"><span class="run-meta">No runs yet. Triggered agents will appear here.</span></div>';
        return;
      }

      const grouped = groupRuns(rawRuns);
      let html = '';

      for (const [groupName, runs] of Object.entries(grouped)) {
        if (runs.length === 0) continue;

        html += `<div class="run-group">
          <div class="group-title">${groupName}</div>`;

        runs.forEach(run => {
          const title = (run.title || 'Unknown Error').replace(/</g, "&lt;").replace(/>/g, "&gt;");
          const sentryUrl = run.sentry_url || '#';
          const agentUrl = run.cursor_url || '#';
          const timeLabel = timeAgo(run.created_at);

          html += `
            <div class="run-item">
              <div class="run-left">
                <div class="status-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a0a0a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                  </svg>
                </div>
                <div class="run-info">
                  <div class="run-title">${title}</div>
                  <div class="run-meta">
                    <a href="${sentryUrl}" target="_blank">Sentry</a>
                    <span>•</span>
                    <a href="${agentUrl}" target="_blank">Agent</a>
                  </div>
                </div>
              </div>
              <div class="run-time">${timeLabel}</div>
            </div>
          `;
        });

        html += `</div>`;
      }
      container.innerHTML = html;
    }

    // Initial render
    renderRuns();

    // Form logic
    document.getElementById('trigger-form').onsubmit = async (e) => {
      e.preventDefault();
      const input = e.target.sentry_url;
      const resultEl = document.getElementById('trigger-result');

      resultEl.textContent = 'Sending…';
      resultEl.style.color = '#666';

      try {
        const r = await fetch('/api/trigger', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sentry_url: input.value }),
          credentials: 'include'
        });
        const data = await r.json();

        if (data.status === 'triggered') {
          if (data.agent_url) {
            resultEl.innerHTML = 'Agent launched: <a href="' + data.agent_url + '" target="_blank">View agent</a>';
          } else {
            resultEl.textContent = 'Agent launched: ' + data.agent_id;
          }
          resultEl.style.color = '#1a7f37';
          // Reload slightly faster
          setTimeout(() => location.reload(), 1500);
        } else {
          resultEl.textContent = data.reason || 'Failed to trigger agent';
          resultEl.style.color = '#cf222e';
        }
      } catch (err) {
        resultEl.textContent = err.message || 'Request failed';
        resultEl.style.color = '#cf222e';
      }
    };
  </script>
</body>

</html>
